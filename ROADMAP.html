<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inteliaudit — Roadmap de Implementación</title>
<style>
  :root {
    --blue: #2E84F0;
    --blue-dark: #1558B0;
    --green: #22C47E;
    --green-dark: #169058;
    --navy: #091624;
    --navy-light: #0f2236;
    --gray-text: #A8B4C8;
    --gray-muted: #6B7A90;
    --border: #1a3352;
    --bg: #060e18;
    --bg-card: #0c1a2e;
    --bg-card-hover: #112240;
    --risk-high: #E53E3E;
    --risk-medium: #D97706;
    --risk-low: #22C47E;
    --risk-info: #2E84F0;
    --font: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
    --mono: 'Cascadia Code', 'Fira Code', 'JetBrains Mono', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: #e2e8f0;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* ── Header ── */
  .header {
    background: linear-gradient(135deg, var(--navy) 0%, #0a1929 100%);
    border-bottom: 1px solid var(--border);
    padding: 24px 0;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(20px);
  }
  .header-inner {
    max-width: 1400px;
    margin: 0 auto;
    padding: 0 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .logo-icon {
    width: 40px; height: 40px;
    background: linear-gradient(135deg, var(--blue), var(--blue-dark));
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; font-weight: 700; color: #fff;
  }
  .logo-text { font-size: 22px; font-weight: 700; }
  .logo-text .inteli { color: var(--blue); }
  .logo-text .audit { color: var(--green); font-weight: 300; }
  .logo-text .roadmap { color: var(--gray-text); font-weight: 300; font-size: 16px; margin-left: 8px; }

  /* ── Stats Bar ── */
  .stats-bar {
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
  }
  .stat {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 14px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 13px;
  }
  .stat-value {
    font-weight: 700;
    font-size: 16px;
    font-family: var(--mono);
  }
  .stat-label { color: var(--gray-text); }
  .stat.completed .stat-value { color: var(--green); }
  .stat.pending .stat-value { color: var(--risk-medium); }
  .stat.total .stat-value { color: var(--blue); }

  .progress-global {
    width: 200px;
    height: 8px;
    background: rgba(255,255,255,0.06);
    border-radius: 4px;
    overflow: hidden;
  }
  .progress-global-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--blue), var(--green));
    border-radius: 4px;
    transition: width 0.5s ease;
  }

  /* ── Main Layout ── */
  .main {
    max-width: 1400px;
    margin: 0 auto;
    padding: 32px;
    display: flex;
    gap: 32px;
  }

  /* ── Sidebar Nav ── */
  .sidebar {
    width: 260px;
    flex-shrink: 0;
    position: sticky;
    top: 100px;
    align-self: flex-start;
    max-height: calc(100vh - 120px);
    overflow-y: auto;
  }
  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .nav-section {
    margin-bottom: 8px;
  }
  .nav-phase {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 14px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
    font-size: 14px;
    font-weight: 600;
    color: var(--gray-text);
    border: 1px solid transparent;
  }
  .nav-phase:hover {
    background: var(--bg-card);
    color: #e2e8f0;
    border-color: var(--border);
  }
  .nav-phase.active {
    background: rgba(46, 132, 240, 0.1);
    color: var(--blue);
    border-color: rgba(46, 132, 240, 0.3);
  }
  .nav-phase .nav-badge {
    margin-left: auto;
    font-size: 11px;
    font-family: var(--mono);
    padding: 2px 8px;
    border-radius: 10px;
    background: rgba(255,255,255,0.06);
  }
  .nav-phase.phase-complete .nav-badge {
    background: rgba(34, 196, 126, 0.15);
    color: var(--green);
  }
  .nav-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .nav-dot.dot-0 { background: var(--gray-muted); }
  .nav-dot.dot-1 { background: var(--blue); }
  .nav-dot.dot-2 { background: #8B5CF6; }
  .nav-dot.dot-3 { background: var(--risk-medium); }
  .nav-dot.dot-4 { background: var(--risk-high); }
  .nav-dot.dot-5 { background: #EC4899; }
  .nav-dot.dot-6 { background: var(--green); }

  /* ── Content ── */
  .content {
    flex: 1;
    min-width: 0;
  }

  /* ── Phase Card ── */
  .phase {
    margin-bottom: 48px;
    scroll-margin-top: 110px;
  }
  .phase-header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 8px;
  }
  .phase-number {
    font-size: 36px;
    font-weight: 800;
    font-family: var(--mono);
    background: linear-gradient(135deg, var(--blue), var(--green));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    line-height: 1;
  }
  .phase-title {
    font-size: 24px;
    font-weight: 700;
  }
  .phase-weeks {
    font-size: 13px;
    color: var(--gray-muted);
    padding: 4px 12px;
    border: 1px solid var(--border);
    border-radius: 20px;
    margin-left: auto;
    white-space: nowrap;
  }
  .phase-objective {
    color: var(--gray-text);
    font-size: 15px;
    margin-bottom: 20px;
    padding-left: 4px;
    border-left: 3px solid var(--border);
    padding: 8px 16px;
    background: rgba(255,255,255,0.02);
    border-radius: 0 8px 8px 0;
  }
  .phase-progress {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
    font-size: 13px;
    color: var(--gray-muted);
  }
  .phase-progress-bar {
    flex: 1;
    height: 4px;
    background: rgba(255,255,255,0.06);
    border-radius: 2px;
    overflow: hidden;
  }
  .phase-progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--blue), var(--green));
    border-radius: 2px;
    transition: width 0.5s ease;
  }

  /* ── Task Group ── */
  .task-group {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 16px;
    overflow: hidden;
  }
  .task-group-header {
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    transition: background 0.2s;
    user-select: none;
  }
  .task-group-header:hover {
    background: var(--bg-card-hover);
  }
  .task-group-toggle {
    width: 24px; height: 24px;
    display: flex; align-items: center; justify-content: center;
    color: var(--gray-muted);
    transition: transform 0.3s;
    flex-shrink: 0;
    font-size: 12px;
  }
  .task-group.expanded .task-group-toggle {
    transform: rotate(90deg);
  }
  .task-group-id {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 700;
    color: var(--blue);
    background: rgba(46, 132, 240, 0.1);
    padding: 2px 10px;
    border-radius: 6px;
    flex-shrink: 0;
  }
  .task-group-name {
    font-weight: 600;
    font-size: 15px;
    flex: 1;
  }
  .task-group-effort {
    font-size: 12px;
    color: var(--gray-muted);
    padding: 3px 10px;
    border: 1px solid var(--border);
    border-radius: 6px;
    white-space: nowrap;
  }
  .task-group-status {
    font-size: 12px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 6px;
    white-space: nowrap;
  }
  .status-pending { background: rgba(255,255,255,0.06); color: var(--gray-muted); }
  .status-in-progress { background: rgba(46, 132, 240, 0.15); color: var(--blue); }
  .status-done { background: rgba(34, 196, 126, 0.15); color: var(--green); }

  .task-group-body {
    display: none;
    border-top: 1px solid var(--border);
  }
  .task-group.expanded .task-group-body {
    display: block;
  }

  /* ── Description block ── */
  .task-desc {
    padding: 16px 20px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .task-desc p {
    color: var(--gray-text);
    font-size: 14px;
    margin-bottom: 8px;
  }
  .task-desc .dep-tag {
    display: inline-block;
    font-size: 12px;
    padding: 2px 8px;
    background: rgba(139, 92, 246, 0.12);
    color: #a78bfa;
    border-radius: 4px;
    margin-right: 6px;
  }

  /* ── Individual Task ── */
  .task-item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 12px 20px;
    border-bottom: 1px solid rgba(255,255,255,0.03);
    transition: background 0.15s;
  }
  .task-item:last-child { border-bottom: none; }
  .task-item:hover { background: rgba(255,255,255,0.02); }

  .task-check {
    width: 20px; height: 20px;
    border: 2px solid var(--border);
    border-radius: 5px;
    flex-shrink: 0;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    margin-top: 1px;
  }
  .task-check:hover {
    border-color: var(--blue);
    background: rgba(46, 132, 240, 0.1);
  }
  .task-check.checked {
    background: var(--green);
    border-color: var(--green);
  }
  .task-check.checked::after {
    content: '✓';
    color: #fff;
    font-size: 12px;
    font-weight: 700;
  }

  .task-content { flex: 1; min-width: 0; }
  .task-label {
    font-size: 14px;
    cursor: pointer;
  }
  .task-item.completed .task-label {
    color: var(--gray-muted);
    text-decoration: line-through;
  }
  .task-briefing {
    margin-top: 6px;
    padding: 8px 12px;
    background: rgba(34, 196, 126, 0.08);
    border-left: 3px solid var(--green);
    border-radius: 0 6px 6px 0;
    font-size: 13px;
    color: var(--green);
    display: flex;
    align-items: flex-start;
    gap: 8px;
  }
  .task-briefing .briefing-icon { flex-shrink: 0; margin-top: 1px; }
  .task-briefing-input {
    display: none;
    margin-top: 8px;
    width: 100%;
  }
  .task-item.completing .task-briefing-input {
    display: flex;
    gap: 8px;
  }
  .task-briefing-input textarea {
    flex: 1;
    background: var(--navy);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 12px;
    color: #e2e8f0;
    font-family: var(--font);
    font-size: 13px;
    resize: vertical;
    min-height: 60px;
  }
  .task-briefing-input textarea:focus {
    outline: none;
    border-color: var(--blue);
  }
  .task-briefing-input button {
    padding: 8px 16px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    align-self: flex-end;
  }
  .btn-save {
    background: var(--green);
    color: #fff;
  }
  .btn-cancel {
    background: rgba(255,255,255,0.08);
    color: var(--gray-text);
  }

  .task-timestamp {
    font-size: 11px;
    color: var(--gray-muted);
    margin-top: 4px;
  }

  /* ── Prompt Block ── */
  .prompt-toggle {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-top: 8px;
    padding: 4px 10px;
    background: rgba(46, 132, 240, 0.08);
    border: 1px solid rgba(46, 132, 240, 0.2);
    border-radius: 6px;
    color: var(--blue);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .prompt-toggle:hover {
    background: rgba(46, 132, 240, 0.15);
    border-color: rgba(46, 132, 240, 0.4);
  }
  .prompt-block {
    display: none;
    margin-top: 12px;
    padding: 16px;
    background: rgba(9, 22, 36, 0.8);
    border: 1px solid var(--border);
    border-radius: 8px;
    position: relative;
  }
  .prompt-block.visible { display: block; }
  .prompt-block pre {
    font-family: var(--mono);
    font-size: 12.5px;
    line-height: 1.7;
    color: #cbd5e1;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .prompt-copy {
    position: absolute;
    top: 8px; right: 8px;
    padding: 4px 10px;
    background: rgba(255,255,255,0.08);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--gray-text);
    font-size: 11px;
    cursor: pointer;
  }
  .prompt-copy:hover { background: rgba(255,255,255,0.15); }
  .prompt-copy.copied { color: var(--green); border-color: var(--green); }

  /* ── Stack Table ── */
  .stack-table {
    width: 100%;
    border-collapse: collapse;
    margin: 16px 0;
    font-size: 14px;
  }
  .stack-table th {
    text-align: left;
    padding: 10px 16px;
    background: rgba(255,255,255,0.04);
    color: var(--gray-text);
    font-weight: 600;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    border-bottom: 1px solid var(--border);
  }
  .stack-table td {
    padding: 10px 16px;
    border-bottom: 1px solid rgba(255,255,255,0.03);
  }

  /* ── Responsive ── */
  @media (max-width: 900px) {
    .main { flex-direction: column; }
    .sidebar { width: 100%; position: static; max-height: none; display: flex; flex-wrap: wrap; gap: 4px; }
    .nav-phase { padding: 6px 10px; font-size: 12px; }
    .header-inner { flex-direction: column; align-items: flex-start; }
  }

  /* ── Export Button ── */
  .export-btn {
    padding: 6px 12px;
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--gray-text);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .export-btn:hover {
    background: rgba(255,255,255,0.1);
    color: #e2e8f0;
  }

  .last-saved {
    font-size: 11px;
    color: var(--gray-muted);
    padding: 4px 10px;
  }

  /* ── Decisions section ── */
  .decisions-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 12px;
    margin: 16px 0;
  }
  .decision-card {
    padding: 14px 18px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 10px;
  }
  .decision-card .dc-num {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--blue);
    margin-bottom: 4px;
  }
  .decision-card .dc-q { font-weight: 600; font-size: 14px; margin-bottom: 6px; }
  .decision-card .dc-rec { font-size: 13px; color: var(--green); }
  .decision-card .dc-alt { font-size: 12px; color: var(--gray-muted); }
</style>
</head>
<body>

<!-- ── HEADER ── -->
<div class="header">
  <div class="header-inner">
    <div class="logo">
      <div class="logo-icon">iA</div>
      <div class="logo-text">
        <span class="inteli">Inteli</span><span class="audit">audit</span>
        <span class="roadmap">/ roadmap</span>
      </div>
    </div>
    <div class="stats-bar">
      <div class="stat completed"><span class="stat-label">Completadas</span> <span class="stat-value" id="stat-done">0</span></div>
      <div class="stat pending"><span class="stat-label">Pendientes</span> <span class="stat-value" id="stat-pending">0</span></div>
      <div class="stat total"><span class="stat-label">Total</span> <span class="stat-value" id="stat-total">0</span></div>
      <div class="progress-global"><div class="progress-global-fill" id="global-progress"></div></div>
      <span class="last-saved" id="last-saved"></span>
      <span class="last-saved" id="conn-status" style="font-weight:600"></span>
      <button class="export-btn" onclick="connectToFile()" title="Guardar estado en un archivo local persistente (Chrome/Edge)">📁 Conectar archivo</button>
      <button class="export-btn" onclick="loadFromFile()" title="Cargar estado desde un archivo guardado previamente">📂 Cargar archivo</button>
      <button class="export-btn" onclick="exportData()">Exportar JSON</button>
      <label class="export-btn" style="cursor:pointer">Importar <input type="file" accept=".json" style="display:none" onchange="importData(event)"></label>
    </div>
  </div>
</div>

<!-- ── MAIN ── -->
<div class="main">
  <!-- Sidebar -->
  <nav class="sidebar" id="sidebar"></nav>
  <!-- Content -->
  <div class="content" id="content"></div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
//  ROADMAP DATA — Inteliaudit Implementation Plan
// ═══════════════════════════════════════════════════════════════

const ROADMAP = [
  {
    id: "fase-0",
    phase: 0,
    title: "Cimientos",
    weeks: "Semana 1-2",
    objective: "Base técnica sólida: migraciones, tests y CI/CD para que todo lo que viene después se construya sobre terreno firme.",
    groups: [
      {
        id: "0.1",
        name: "Migraciones Alembic",
        effort: "2-3 horas",
        description: "Inicializar Alembic y generar migration inicial desde los 20+ modelos ORM existentes. Sin esto, cada deploy a producción requiere recrear la DB a mano.",
        dependencies: [],
        prompt: `Necesito que inicialices Alembic en el proyecto Inteliaudit para manejar migraciones de base de datos. El proyecto usa SQLAlchemy 2.0 async con modelos definidos en db/models.py y el engine en db/base.py. La configuración de conexión está en config/settings.py (propiedad async_database_url).

Pasos:
1. Ejecutar alembic init alembic en la raíz del proyecto
2. Configurar alembic/env.py para:
   - Importar Base desde db.base y todos los modelos desde db.models
   - Usar config.settings.async_database_url como sqlalchemy.url
   - Soportar modo async (run_async_migrations)
3. Generar la primera migración automática: alembic revision --autogenerate -m "initial_schema"
4. Verificar que la migración se ejecuta correctamente contra SQLite local
5. Actualizar render.yaml para agregar "alembic upgrade head" antes del startCommand
6. Actualizar el Procfile si existe

Contexto técnico:
- Los modelos incluyen: Firma, Usuario, Cliente, Auditoria, Declaracion, DeclaracionJurada, RG90, SifenComprobante, Hechauka, Hallazgo, Tarea, Cedula, Informe, CredencialMarangatu, AuditTrail
- En producción se usa PostgreSQL (Neon), en dev SQLite con aiosqlite
- La DB URL se normaliza en settings.py (postgres:// → postgresql+asyncpg://)

Hacerlo con innovación y profesionalismo y siempre registrar los avances y la información pertinente en el roadmap.`,
        tasks: [
          "Ejecutar alembic init alembic en raíz del proyecto",
          "Configurar alembic/env.py con async support e importación de todos los modelos",
          "Generar primera migración automática (initial_schema)",
          "Verificar ejecución de migración contra SQLite local",
          "Agregar alembic upgrade head al buildCommand de render.yaml y Procfile"
        ]
      },
      {
        id: "0.2",
        name: "Tests fundamentales",
        effort: "1 semana",
        description: "Crear suite de tests con pytest + pytest-asyncio para los módulos financieros críticos. Un bug en cálculo de contingencia o cruce IVA destruye la credibilidad del producto.",
        dependencies: [],
        prompt: `Necesito que crees la suite de tests fundamentales para Inteliaudit. El proyecto usa Python 3.12, pytest, pytest-asyncio, y SQLAlchemy async. Los tests deben cubrir la lógica financiera crítica que no puede fallar.

Estructura a crear:
tests/
├── conftest.py           — fixtures: DB SQLite in-memory async, firma/usuario/cliente de prueba
├── fixtures/
│   ├── rg90_compras.xlsx — archivo RG90 de ejemplo con datos sintéticos paraguayos
│   ├── rg90_ventas.xlsx  — archivo RG90 ventas de ejemplo
│   ├── hechauka.xlsx     — archivo HECHAUKA de ejemplo
│   └── sifen_de.xml      — XML de comprobante electrónico e-Kuatia
├── test_iva.py           — tests de los 5 cruces IVA (RG90 vs Form.120, RG90 vs SIFEN, SIFEN vs RG90, RG90 vs HECHAUKA, RUC proveedores)
├── test_riesgo.py        — cálculo de contingencia, multas (50%), intereses (1% mensual), clasificación de riesgo
├── test_auth.py          — login, generación JWT, validación token, permisos por rol (admin vs auditor)
├── test_parser_rg90.py   — parsing del XLSX RG90 (columnas: RUC, nro comprobante, CDC, fecha, base10, base5, exento, IVA)
├── test_sifen.py         — parsing XML e-Kuatia, extracción de CDC, montos, validación estructura

Contexto clave:
- Montos siempre en Guaraníes (PYG), sin decimales

// ═══════════════════════════════════════════════════════════════
//  STATE MANAGEMENT — Multi-layer persistence
//  Priority: 1) Server API  2) File System Access API  3) localStorage
// ═══════════════════════════════════════════════════════════════

const STORAGE_KEY = 'inteliaudit_roadmap_v2';
const STATE_FILENAME = 'roadmap-state.json';

// Try multiple server ports (roadmap-server.py on 4900, FastAPI on 8000)
const API_CANDIDATES = (() => {
  const loc = window.location;
  const urls = [];
  if (loc.protocol !== 'file:') urls.push(`${loc.origin}/api`);
  if (loc.port !== '4900') urls.push('http://localhost:4900/api');
  if (loc.port !== '8000') urls.push('http://localhost:8000/api');
  return urls;
})();

let _stateCache = null;
let _saveDebounce = null;
let _apiBase = null;           // resolved server URL (null = no server)
let _fileHandle = null;        // File System Access API handle
let _persistMode = 'local';    // 'server' | 'file' | 'local'

async function initState() {
  // 1) Try server APIs
  for (const base of API_CANDIDATES) {
    try {
      const res = await fetch(`${base}/roadmap-state`, { signal: AbortSignal.timeout(2000) });
      if (res.ok) {
        _stateCache = await res.json();
        _apiBase = base;
        _persistMode = 'server';
        localStorage.setItem(STORAGE_KEY, JSON.stringify(_stateCache));
        updateConnectionStatus();
        return;
      }
    } catch {}
  }

  // 2) Try loading from localStorage (always available as baseline)
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    _stateCache = raw ? JSON.parse(raw) : {};
  } catch { _stateCache = {}; }

  _persistMode = 'local';
  updateConnectionStatus();
}

function loadState() {
  return _stateCache || {};
}

function saveState(state) {
  state._lastSaved = new Date().toISOString();
  _stateCache = state;
  // Always save to localStorage immediately
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  updateLastSaved(state._lastSaved);
  // Debounced persist to durable storage
  if (_saveDebounce) clearTimeout(_saveDebounce);
  _saveDebounce = setTimeout(() => persistState(state), 300);
}

async function persistState(state) {
  const json = JSON.stringify(state, null, 2);

  // Try server
  if (_apiBase) {
    try {
      const res = await fetch(`${_apiBase}/roadmap-state`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: json,
        signal: AbortSignal.timeout(5000),
      });
      if (res.ok) { _persistMode = 'server'; updateConnectionStatus(); return; }
    } catch {}
    _apiBase = null; // server went away
  }

  // Try File System Access API handle
  if (_fileHandle) {
    try {
      const writable = await _fileHandle.createWritable();
      await writable.write(json);
      await writable.close();
      _persistMode = 'file';
      updateConnectionStatus();
      return;
    } catch { _fileHandle = null; }
  }

  _persistMode = 'local';
  updateConnectionStatus();
}

// Let user pick a file to persist to (File System Access API)
async function connectToFile() {
  if (!('showSaveFilePicker' in window)) {
    alert('Tu navegador no soporta File System Access API.\nUsá Chrome o Edge, o iniciá roadmap-server.py.');
    return;
  }
  try {
    _fileHandle = await window.showSaveFilePicker({
      suggestedName: STATE_FILENAME,
      types: [{ description: 'JSON', accept: { 'application/json': ['.json'] } }],
    });
    // Write current state immediately
    const state = loadState();
    const writable = await _fileHandle.createWritable();
    await writable.write(JSON.stringify(state, null, 2));
    await writable.close();
    _persistMode = 'file';
    updateConnectionStatus();
  } catch (e) {
    if (e.name !== 'AbortError') alert('Error al conectar archivo: ' + e.message);
  }
}

// Load state from a previously saved file
async function loadFromFile() {
  if (!('showOpenFilePicker' in window)) {
    alert('Tu navegador no soporta File System Access API.\nUsá Chrome o Edge.');
    return;
  }
  try {
    const [handle] = await window.showOpenFilePicker({
      types: [{ description: 'JSON', accept: { 'application/json': ['.json'] } }],
    });
    _fileHandle = handle;
    const file = await handle.getFile();
    const text = await file.text();
    _stateCache = JSON.parse(text);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(_stateCache));
    _persistMode = 'file';
    updateConnectionStatus();
    render();
  } catch (e) {
    if (e.name !== 'AbortError') alert('Error al cargar archivo: ' + e.message);
  }
}

function updateConnectionStatus() {
  const el = document.getElementById('conn-status');
  if (!el) return;
  const modes = {
    server: { text: `Servidor (${_apiBase})`, color: 'var(--green)', icon: '●' },
    file:   { text: 'Archivo local (persistente)', color: 'var(--green)', icon: '●' },
    local:  { text: 'Solo localStorage', color: 'var(--risk-medium)', icon: '○' },
  };
  const m = modes[_persistMode];
  el.innerHTML = `<span style="color:${m.color}">${m.icon}</span> ${m.text}`;
  el.style.color = m.color;
}

function getTaskKey(groupId, taskIdx) {
  return `${groupId}__${taskIdx}`;
}

function isTaskCompleted(state, groupId, taskIdx) {
  const key = getTaskKey(groupId, taskIdx);
  return state[key]?.completed || false;
}

function getTaskBriefing(state, groupId, taskIdx) {
  const key = getTaskKey(groupId, taskIdx);
  return state[key]?.briefing || null;
}

function getTaskTimestamp(state, groupId, taskIdx) {
  const key = getTaskKey(groupId, taskIdx);
  return state[key]?.timestamp || null;
}

function toggleTask(groupId, taskIdx, briefing = null) {
  const state = loadState();
  const key = getTaskKey(groupId, taskIdx);
  if (!state[key]) state[key] = {};

  if (state[key].completed) {
    state[key].completed = false;
    state[key].briefing = null;
    state[key].timestamp = null;
  } else {
    state[key].completed = true;
    state[key].briefing = briefing;
    state[key].timestamp = new Date().toISOString();
  }
  saveState(state);
  render();
}

// ═══════════════════════════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════════════════════════

function render() {
  const state = loadState();
  renderSidebar(state);
  renderContent(state);
  updateStats(state);
  updateLastSaved(state._lastSaved);
}

function updateLastSaved(ts) {
  const el = document.getElementById('last-saved');
  if (ts) {
    const d = new Date(ts);
    el.textContent = `Guardado: ${d.toLocaleDateString('es-PY')} ${d.toLocaleTimeString('es-PY', {hour:'2-digit',minute:'2-digit'})}`;
  }
}

function getPhaseStats(phase, state) {
  let total = 0, done = 0;
  phase.groups.forEach(g => {
    g.tasks.forEach((_, ti) => {
      total++;
      if (isTaskCompleted(state, g.id, ti)) done++;
    });
  });
  return { total, done, pct: total ? Math.round(done/total*100) : 0 };
}

function updateStats(state) {
  let total = 0, done = 0;
  ROADMAP.forEach(p => {
    const s = getPhaseStats(p, state);
    total += s.total;
    done += s.done;
  });
  document.getElementById('stat-done').textContent = done;
  document.getElementById('stat-pending').textContent = total - done;
  document.getElementById('stat-total').textContent = total;
  document.getElementById('global-progress').style.width = (total ? (done/total*100) : 0) + '%';
}

function renderSidebar(state) {
  const sidebar = document.getElementById('sidebar');
  sidebar.innerHTML = ROADMAP.map(p => {
    const s = getPhaseStats(p, state);
    const isComplete = s.done === s.total && s.total > 0;
    return `<div class="nav-section">
      <div class="nav-phase ${isComplete ? 'phase-complete' : ''}" onclick="scrollToPhase('${p.id}')">
        <span class="nav-dot dot-${p.phase}"></span>
        Fase ${p.phase}: ${p.title}
        <span class="nav-badge">${s.done}/${s.total}</span>
      </div>
    </div>`;
  }).join('');
}

function renderContent(state) {
  const content = document.getElementById('content');
  content.innerHTML = ROADMAP.map(phase => {
    const ps = getPhaseStats(phase, state);
    return `
    <div class="phase" id="${phase.id}">
      <div class="phase-header">
        <span class="phase-number">${phase.phase}</span>
        <span class="phase-title">${phase.title}</span>
        <span class="phase-weeks">${phase.weeks}</span>
      </div>
      <div class="phase-objective">${phase.objective}</div>
      <div class="phase-progress">
        <span>${ps.pct}% completado</span>
        <div class="phase-progress-bar"><div class="phase-progress-fill" style="width:${ps.pct}%"></div></div>
        <span>${ps.done}/${ps.total}</span>
      </div>
      ${phase.groups.map(group => renderGroup(group, state)).join('')}
    </div>`;
  }).join('');
}

function renderGroup(group, state) {
  let totalTasks = group.tasks.length;
  let doneTasks = group.tasks.filter((_, i) => isTaskCompleted(state, group.id, i)).length;
  let statusClass = doneTasks === 0 ? 'status-pending' : doneTasks === totalTasks ? 'status-done' : 'status-in-progress';
  let statusText = doneTasks === 0 ? 'Pendiente' : doneTasks === totalTasks ? 'Completado' : `${doneTasks}/${totalTasks}`;

  const deps = group.dependencies.length > 0
    ? `<p>${group.dependencies.map(d => `<span class="dep-tag">Depende de ${d}</span>`).join('')}</p>`
    : '';

  return `
  <div class="task-group" id="group-${group.id}">
    <div class="task-group-header" onclick="toggleGroup('${group.id}')">
      <span class="task-group-toggle">&#9654;</span>
      <span class="task-group-id">${group.id}</span>
      <span class="task-group-name">${group.name}</span>
      <span class="task-group-effort">${group.effort}</span>
      <span class="task-group-status ${statusClass}">${statusText}</span>
    </div>
    <div class="task-group-body">
      <div class="task-desc">
        <p>${group.description}</p>
        ${deps}
        <div class="prompt-toggle" onclick="togglePrompt(event, '${group.id}')">
          <span>&#128203;</span> Ver prompt de implementación
        </div>
        <div class="prompt-block" id="prompt-${group.id}">
          <button class="prompt-copy" onclick="copyPrompt(event, '${group.id}')">Copiar</button>
          <pre>${escapeHtml(group.prompt)}</pre>
        </div>
      </div>
      ${group.tasks.map((task, ti) => renderTask(group.id, ti, task, state)).join('')}
    </div>
  </div>`;
}

function renderTask(groupId, taskIdx, taskText, state) {
  const completed = isTaskCompleted(state, groupId, taskIdx);
  const briefing = getTaskBriefing(state, groupId, taskIdx);
  const timestamp = getTaskTimestamp(state, groupId, taskIdx);
  const taskId = `task-${groupId}-${taskIdx}`;

  let briefingHtml = '';
  if (completed && briefing) {
    briefingHtml = `<div class="task-briefing">
      <span class="briefing-icon">&#9989;</span>
      <span>${escapeHtml(briefing)}</span>
    </div>`;
    if (timestamp) {
      briefingHtml += `<div class="task-timestamp">${new Date(timestamp).toLocaleString('es-PY')}</div>`;
    }
  }

  return `
  <div class="task-item ${completed ? 'completed' : ''}" id="${taskId}">
    <div class="task-check ${completed ? 'checked' : ''}" onclick="handleTaskClick('${groupId}', ${taskIdx})"></div>
    <div class="task-content">
      <span class="task-label" onclick="handleTaskClick('${groupId}', ${taskIdx})">${escapeHtml(taskText)}</span>
      ${briefingHtml}
      <div class="task-briefing-input">
        <textarea id="briefing-${groupId}-${taskIdx}" placeholder="Breve descripción de lo que se hizo..."></textarea>
        <div style="display:flex;flex-direction:column;gap:4px">
          <button class="btn-save" onclick="saveBriefing('${groupId}', ${taskIdx})">Guardar</button>
          <button class="btn-cancel" onclick="cancelBriefing('${groupId}', ${taskIdx})">Cancelar</button>
        </div>
      </div>
    </div>
  </div>`;
}

// ═══════════════════════════════════════════════════════════════
//  INTERACTIONS
// ═══════════════════════════════════════════════════════════════

function toggleGroup(groupId) {
  const el = document.getElementById(`group-${groupId}`);
  el.classList.toggle('expanded');
}

function scrollToPhase(phaseId) {
  document.getElementById(phaseId).scrollIntoView({ behavior: 'smooth' });
  // Highlight briefly
  document.querySelectorAll('.nav-phase').forEach(n => n.classList.remove('active'));
  event.currentTarget.classList.add('active');
}

function togglePrompt(e, groupId) {
  e.stopPropagation();
  document.getElementById(`prompt-${groupId}`).classList.toggle('visible');
}

function copyPrompt(e, groupId) {
  e.stopPropagation();
  const group = ROADMAP.flatMap(p => p.groups).find(g => g.id === groupId);
  navigator.clipboard.writeText(group.prompt).then(() => {
    const btn = e.target;
    btn.textContent = '✓ Copiado';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copiar'; btn.classList.remove('copied'); }, 2000);
  });
}

function handleTaskClick(groupId, taskIdx) {
  const state = loadState();
  const completed = isTaskCompleted(state, groupId, taskIdx);

  if (completed) {
    // Uncomplete — remove briefing
    toggleTask(groupId, taskIdx);
  } else {
    // Show briefing input
    const taskEl = document.getElementById(`task-${groupId}-${taskIdx}`);
    taskEl.classList.add('completing');
    const textarea = document.getElementById(`briefing-${groupId}-${taskIdx}`);
    textarea.focus();
  }
}

function saveBriefing(groupId, taskIdx) {
  const textarea = document.getElementById(`briefing-${groupId}-${taskIdx}`);
  const briefing = textarea.value.trim() || 'Completado';
  toggleTask(groupId, taskIdx, briefing);
}

function cancelBriefing(groupId, taskIdx) {
  const taskEl = document.getElementById(`task-${groupId}-${taskIdx}`);
  taskEl.classList.remove('completing');
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ═══════════════════════════════════════════════════════════════
//  EXPORT / IMPORT
// ═══════════════════════════════════════════════════════════════

function exportData() {
  const state = loadState();
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `inteliaudit-roadmap-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      _stateCache = data;
      saveState(data);
      render();
      alert('Datos importados correctamente');
    } catch {
      alert('Error: archivo JSON inválido');
    }
  };
  reader.readAsText(file);
}

// ═══════════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════════
(async () => {
  await initState();
  render();
})();
</script>
