services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: inteliaudit
      POSTGRES_USER: inteliaudit
      POSTGRES_PASSWORD: inteliaudit_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inteliaudit"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://inteliaudit:inteliaudit_dev@db:5432/inteliaudit
      AI_PROVIDER: gemini
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-change-in-production}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      POSTHOG_API_KEY: ${POSTHOG_API_KEY:-}
      ALLOWED_ORIGINS: '["http://localhost:5173","http://localhost:3000"]'
      FRONTEND_URL: http://localhost:5173
    volumes:
      - ./storage:/app/storage
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head && uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload"

  ui:
    image: node:20-alpine
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./ui-web:/app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"

  worker:
    build: .
    environment:
      DATABASE_URL: postgresql+asyncpg://inteliaudit:inteliaudit_dev@db:5432/inteliaudit
      SECRET_KEY: ${SECRET_KEY:-dev-secret-change-in-production}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
    volumes:
      - ./storage:/app/storage
    depends_on:
      db:
        condition: service_healthy
    command: python worker.py

volumes:
  pgdata:
