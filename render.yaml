services:
  - type: web
    name: inteliaudit
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install -e . && cd ui-web && npm ci && npm run build && cd ..
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        sync: false   # Pegá acá el connection string de Neon (postgresql://...)
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "false"
      - key: STORAGE_PATH
        value: /opt/render/project/src/storage
      - key: ANTHROPIC_API_KEY
        sync: false   # opcional — para el análisis con Claude IA
