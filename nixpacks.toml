[phases.setup]
nixPkgs = ["python312", "nodejs_18", "gcc"]

[phases.install]
cmds = ["python -m venv --copies /opt/venv && . /opt/venv/bin/activate && pip install --upgrade build setuptools && pip install ."]

[phases.build]
cmds = ["pip install -e . && cd ui-web && npm ci && npm run build && cd .."]

[start]
cmd = "alembic upgrade head && uvicorn api.main:app --host 0.0.0.0 --port $PORT"
