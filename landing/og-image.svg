<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#071e3d"/>
      <stop offset="35%" style="stop-color:#0d3a6b"/>
      <stop offset="70%" style="stop-color:#104c91"/>
      <stop offset="100%" style="stop-color:#1561e1"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00a651"/>
      <stop offset="100%" style="stop-color:#1ecb73"/>
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="rgba(255,255,255,0.06)"/>
    </pattern>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  
  <!-- Decorative circles -->
  <circle cx="1050" cy="100" r="200" fill="rgba(0,166,81,0.08)"/>
  <circle cx="150" cy="550" r="180" fill="rgba(30,203,115,0.06)"/>
  
  <!-- Logo icon -->
  <g transform="translate(100, 220)">
    <rect width="80" height="80" rx="20" fill="url(#greenGrad)" filter="url(#glow)"/>
    <circle cx="35" cy="38" r="16" stroke="white" stroke-width="4" fill="none"/>
    <line x1="47" y1="50" x2="60" y2="63" stroke="white" stroke-width="5" stroke-linecap="round"/>
    <path d="M28 38.5l5 5 9-9" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <circle cx="68" cy="14" r="7" fill="#4ade80"/>
  </g>
  
  <!-- Main title -->
  <text x="220" y="265" font-family="Inter, -apple-system, sans-serif" font-weight="900" font-size="72" fill="white" letter-spacing="-2">
    Inteliaudit
  </text>
  
  <!-- Tagline -->
  <text x="220" y="320" font-family="Inter, -apple-system, sans-serif" font-weight="400" font-size="28" fill="rgba(255,255,255,0.85)">
    Auditoría impositiva que se hace sola.
  </text>
  
  <!-- Features -->
  <g transform="translate(220, 380)">
    <rect width="760" height="120" rx="16" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
    
    <!-- Feature 1 -->
    <g transform="translate(30, 25)">
      <circle cx="15" cy="15" r="15" fill="rgba(0,166,81,0.3)"/>
      <text x="15" y="20" font-family="Inter, sans-serif" font-size="14" fill="#4ade80" text-anchor="middle" font-weight="700">✓</text>
      <text x="40" y="14" font-family="Inter, sans-serif" font-size="16" fill="white" font-weight="700">Cruce automático</text>
      <text x="40" y="34" font-family="Inter, sans-serif" font-size="13" fill="rgba(255,255,255,0.7)">RG90 × SIFEN × HECHAUKA</text>
    </g>
    
    <!-- Feature 2 -->
    <g transform="translate(280, 25)">
      <circle cx="15" cy="15" r="15" fill="rgba(0,166,81,0.3)"/>
      <text x="15" y="20" font-family="Inter, sans-serif" font-size="14" fill="#4ade80" text-anchor="middle" font-weight="700">✓</text>
      <text x="40" y="14" font-family="Inter, sans-serif" font-size="16" fill="white" font-weight="700">IA integrada</text>
      <text x="40" y="34" font-family="Inter, sans-serif" font-size="13" fill="rgba(255,255,255,0.7)">Narrativa con base legal</text>
    </g>
    
    <!-- Feature 3 -->
    <g transform="translate(510, 25)">
      <circle cx="15" cy="15" r="15" fill="rgba(0,166,81,0.3)"/>
      <text x="15" y="20" font-family="Inter, sans-serif" font-size="14" fill="#4ade80" text-anchor="middle" font-weight="700">✓</text>
      <text x="40" y="14" font-family="Inter, sans-serif" font-size="16" fill="white" font-weight="700">Informes PDF/Word</text>
      <text x="40" y="34" font-family="Inter, sans-serif" font-size="13" fill="rgba(255,255,255,0.7)">Firmables en 1 clic</text>
    </g>
    
    <!-- Bottom text -->
    <text x="380" y="90" font-family="Inter, sans-serif" font-size="14" fill="rgba(255,255,255,0.6)" text-anchor="middle">
      Para firmas auditoras paraguayas · Ley 6380/2019
    </text>
  </g>
  
  <!-- Badge -->
  <g transform="translate(220, 170)">
    <rect width="280" height="32" rx="16" fill="rgba(0,166,81,0.2)" stroke="rgba(0,166,81,0.4)" stroke-width="1"/>
    <circle cx="18" cy="16" r="5" fill="#4ade80"/>
    <text x="32" y="21" font-family="Inter, sans-serif" font-size="12" fill="#4ade80" font-weight="700" letter-spacing="0.5">
      SISTEMA SIN PRECEDENTES EN PARAGUAY
    </text>
  </g>
  
  <!-- Bottom bar -->
  <rect x="0" y="580" width="1200" height="50" fill="rgba(0,0,0,0.3)"/>
  <text x="100" y="610" font-family="Inter, sans-serif" font-size="14" fill="rgba(255,255,255,0.6)">
    inteliaudit.com.py
  </text>
  <text x="1100" y="610" font-family="Inter, sans-serif" font-size="14" fill="rgba(255,255,255,0.6)" text-anchor="end">
    Desarrollado por Intellihouse Soluciones E.A.S.
  </text>
</svg>
